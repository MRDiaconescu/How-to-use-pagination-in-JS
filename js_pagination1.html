<script>


function draw_diamond(size, x, y, str, arg1, arg2, arg3) {


var canvas = document.querySelector(str).getContext('2d'),side = 0,
    size = size,
    x = x,
    y = y;



canvas.beginPath();



canvas.moveTo(x + size * Math.cos(0), y + size * Math.sin(0));

for (side; side < 5; side++) {
  canvas.lineTo(x + size * Math.cos(side * 2 * Math.PI / 4), y + size * Math.sin(side * 2 * Math.PI / 4));
}



canvas.shadowColor =  arg1;
canvas.shadowBlur = arg2;
canvas.shadowOffsetX = 0;
canvas.shadowOffsetY = 0;

canvas.fillStyle = arg3;
canvas.fill();

canvas.closePath();




}

function myFunction(arg1) {
  var x = document.getElementById(arg1);
  if (x.style.display === "none") {
    x.style.display = "block";
  } else {
    x.style.display = "none";
  }
}

var page = 1;

function showPage(page) {
    $('.pagination .post:not(#page'+page+')').hide();
    $('.pagination .post#page'+page).show();
}

function prevPage() {
    if (page == 1) {
        page = $('.pagination .post').length;
    } else {
        page--;
    }
    showPage(page);
}

function nextPage() {
    if (page == $('.pagination .post').length) {
        page = 1;
    } else {
        page++;
    }
    showPage(page);
}

$(document).ready(function() {
    showPage(page);
    
    $('#prev').click(prevPage);
    $('#next').click(nextPage);
});


</script>
